# Render params with secrets example
#
# Templates that define secrets[] can use this format to provide
# both render parameters and secret values in a single file.
#
# Usage:
#   export SOPS_AGE_RECIPIENTS="age1..."
#   claims render --non-interactive \
#     -f examples/render-with-secrets-params.yaml \
#     -o ./output
#
# The 'parameters' section is used for template rendering (sent to API).
# The 'secrets' section is used for SOPS encryption (stays local, never sent to API).

template: clusterbook
parameters:
  CLUSTERBOOK_NAMESPACE: clusterbook
  CLUSTERBOOK_VERSION: v1.11.0
  CLUSTERBOOK_HOSTNAME: clusterbook
  GATEWAY_NAME: movie-scripts2-gateway
  GATEWAY_NAMESPACE: default
  DOMAIN: movie-scripts2.sthings-vsphere.labul.sva.de
  PDNS_ENABLED: "true"
  PDNS_URL: https://pdns.sthings-vsphere.labul.sva.de
  PDNS_ZONE: sthings.io
  secretName: clusterbook-pdns-vars
  secretNamespace: flux-system
secrets:
  PDNS_TOKEN: your-pdns-token-here
